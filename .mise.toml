[tools]
node = "24.15.0"
pnpm = "10.33.0"
bun = "1.3.12"
deno = "2.7.12"
rust = "1.95.0"
go = "1.26.2"
ruby = "4.0.2"
python = "3.14.4"
dotnet = "10.0.202"
uv = "0.11.7"
"npm:@antfu/ni" = "30.0.0"
"aqua:openai/codex" = "0.128.0"
"aqua:biomejs/biome" = "2.4.8"

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["node", "ruby"]
minimum_release_age = "14d"
# npm/npx are blocked by ~/dotfiles/pnpm/bin stubs — route mise's npm:
# backend through pnpm so installs still work.
npm.package_manager = "pnpm"

[hooks]
enter = '''
target="${MISE_ORIGINAL_CWD:-$PWD}"
if [ -n "$target" ] && [ "$target" != "$HOME" ] \
  && [ -f "$target/package.json" ] \
  && [ ! -e "$target/pnpm-workspace.yaml" ]; then
  cp "$HOME/dotfiles/pnpm/pnpm-workspace.yaml" "$target/pnpm-workspace.yaml"
  echo "[mise] generated pnpm-workspace.yaml from dotfiles template"
fi
'''
