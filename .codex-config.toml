model_reasoning_effort = "high"
sandbox_mode = "workspace-write"
network_access = true

[tools]
web_search = true

[mcp_servers.context7]
# `npx` is blocked by ~/dotfiles/pnpm/bin stub. Route via pnpm so the
# install respects pnpm's min-release-age cooldown too.
command = "pnpm"
args = ["dlx", "@upstash/context7-mcp"]
