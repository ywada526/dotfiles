[tools]
node = "26.4.0"
pnpm = "11.8.0"
bun = "1.3.12"
deno = "2.7.12"
rust = "1.95.0"
go = "1.26.2"
ruby = "4.0.2"
python = "3.14.4"
dotnet = "10.0.202"
uv = "0.11.7"
"npm:@antfu/ni" = "30.0.0"
"aqua:openai/codex" = "0.142.5"
"aqua:biomejs/biome" = "2.4.8"
"npm:@aikidosec/safe-chain" = "1.5.12"
"cargo:tirith" = "0.3.2"
"aqua:rustsec/rustsec/cargo-audit" = "0.22.1"
"aqua:EmbarkStudios/cargo-deny" = "0.19.4"
"npm:skills" = "1.5.5"
"npm:agent-browser" = "0.27.0"

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["node", "ruby"]
minimum_release_age = "14d"
# Keep mise's npm backend on pnpm for supply-chain defaults even though
# the npm CLI itself is available for project work.
npm.package_manager = "pnpm"
pin = true
