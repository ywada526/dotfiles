# Local pip defaults.
# Primary Python tool here is uv (see ../mise/.mise.toml). pip is fallback.
# pip is also wrapped via sfw in ../shell/package-guards.sh.

[install]
# Refuse `pip install <pkg>` outside a virtualenv. Prevents accidental
# system-wide installs and the postinstall-style code execution that
# comes with sdists landing in $HOME.
require-virtualenv = true

# Wheels only — skip sdist downloads. sdists run setup.py / a build
# backend at install time, which is pip's equivalent of npm's
# postinstall lifecycle script. Wheels are static archives. Trades
# some compatibility (sdist-only packages fail) for a closed
# install-time code-execution surface. Override per-command with
# `--no-binary <pkg>` when you really need an sdist.
only-binary = :all:

[global]
disable-pip-version-check = true
